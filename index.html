<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enfado City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        /* الهيدر */
        header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }
        /* السيكشن الرئيسي بتاع الفيديو */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .hero-section h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #e50914; /* أحمر سينمائي */
        }
        .hero-section p {
            font-size: 1.1rem;
            max-width: 600px;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        /* حاوية الفيديو عشان يشتغل ويظبط مقاسه تلقائي */
        .video-container {
            width: 100%;
            max-width: 800px;
            border: 2px solid #222;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.8);
            background-color: #000;
            aspect-ratio: 16/9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Enfado City</h1>
    </header>

    <section class="hero-section">
        <h2>Visual Chaos . Cinematic Precision</h2>
        <p>We are a full-service media production house turning raw energy and street culture into high-end cinematic art.</p>
        
        <!-- هنا الفيديو بتاعك -->
        <div class="video-container">
            <video controls autoplay muted loop>
                <source src="showreel.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </section>

</body>
</html>
